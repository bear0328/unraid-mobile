services:
  unraid-mobile-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: unraid-mobile:latest
    container_name: unraid-mobile-dev
    restart: unless-stopped
    ports:
      - '3998:80'
    environment:
      - TZ=Asia/Shanghai
      # 【续 50】default.conf 改 envsubst 模板,/graphql 上游由该变量注入
      - UNRAID_UPSTREAM=http://192.168.6.140:8001
    volumes:
      # 【续 42.5.5 2026-06-19】挂载 host dist 进容器,让 simple 模式真正生效
      # 顺序:必须在 ./config 子挂载前面,后者覆盖这个父挂载的 config/ 子目录
      - ./dist:/usr/share/nginx/html
      - ./config:/usr/share/nginx/html/config
      # 挂载 unRAID 用户共享目录（读写权限，用于文件管理）
      - /mnt/user:/mnt/user
      # /mnt/user 下的 symlink 指向 ../cache/...，必须同时挂 cache 共享
      # 否则 symlink 是 broken 的，nginx DAV 报错 500
      - /mnt/cache:/mnt/cache
      # 日志查看（只读）- 用于 Logs 页系统 tab 看 syslog
      # 不能直接挂 /var/log:/var/log:ro —— nginx 本身要写 /var/log/nginx/error.log
      # 所以挂到 /mnt/hostlog:ro，nginx 用 alias 跳转
      - /var/log:/mnt/hostlog:ro
      # 【D4 2026-06-14】WebDAV 鉴权密码文件（bcrypt 加密，只读）
      # 必须可被 nginx 进程（uid=100 nginx:alpine）读：chmod 644 nginx/.davpasswd
      - ./nginx/.davpasswd:/etc/nginx/.davpasswd:ro
      # 【阶段 5.1.b 2026-06-14】/var/log 鉴权密码文件（bcrypt 加密，只读）
      # 同样 chmod 644 nginx/.logpasswd
      - ./nginx/.logpasswd:/etc/nginx/.logpasswd:ro
      # 【续 47 2026-07-19】Compose API: 宿主 php-fpm socket(api.php 在宿主以 root 执行 docker compose)
      # 宿主 socket 属 root:root 660,容器 nginx worker 靠 root 组访问(见 nginx/nginx.conf user 行)
      - /var/run/php-fpm.sock:/hostrun/php-fpm.sock
      # 【续 47 2026-07-19】nginx 配置改走挂载 — 镜像 baked 版是上古版(46.4 事故),
      # 挂载后容器重建不再丢配置,重建零风险
      # 【续 50】default.conf 改挂为 envsubst 模板(配合 UNRAID_UPSTREAM 环境变量)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./default.conf:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      # 镜像里 HEALTHCHECK 用 localhost,alpine 容器解析到 ::1,nginx 只听 IPv4,永远 refused
      # 这里用 127.0.0.1 覆盖(2026-07-17)
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
