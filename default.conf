# 【续 46.4 2026-07-18】WebSocket upgrade 支持(graphql-ws 容器 stats 订阅经本代理)
# map 只能在 http 上下文 — conf.d 包含于 http 块,放 server{} 外有效
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    # HTTP/2 明文升级（h2c）— nginx 1.25.1+ 原生支持
    # 6 个 chunk 资源并发，spa 首屏节省 30-50%
    listen 80 default_server;
    http2 on;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 【续 50.2 2026-07-19】鉴权失败统一改走 @auth_required。
    # 目标:别让浏览器弹原生登录框(手机浏览器对 401+WWW-Authenticate 的 fetch 也会弹)。
    # error_page 改不掉 auth_basic 加的 WWW-Authenticate 头(实测头会带到重定向响应),
    # 而浏览器只对 401+WA 弹框、403 不弹 → 故鉴权失败改返 403(JSON),前端按 401/403 同判。
    error_page 401 = @auth_required;
    location @auth_required {
        default_type application/json;
        return 403 '{"error":"forbidden"}';
    }

    # === 性能优化: gzip 压缩 ===
    # bundle.js 246KB -> gzip 后 ~80KB (省 60-70%)
    # bundle.css 31KB -> gzip 后 ~8KB (省 70%)
    # SPA 首次加载省 100-200ms (4G/WiFi)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # 文件浏览 - /files/* （重写到 /mnt/cache/ 因为 dev 不走 shfs user 视图）
    # 前端现在列 /files/cache/ 看到的就是 user share 的实际文件
    location /files {
        # 内部重写，去掉 /files 前缀
        rewrite ^/files(.*)$ $1 break;
        
        # root 指向 /mnt（/files/user/* 走 shfs，/files/cache/* 走 cache 池）
        root /mnt;
        
        # 【续 50 安全止损】读也鉴权 — 此前整个 /mnt(含 appdata 其他容器密钥)无鉴权可读。
        # 与 /dav/ 共用 .davpasswd;前端经 davFetch 自动带 Authorization(同源,无 CORS 预检)。
        auth_basic "unRAID Mobile File Access";
        auth_basic_user_file /etc/nginx/.davpasswd;
        
        # 开启目录列表
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        
        # 尝试显示默认文件
        index index.html index.htm;
    }

    # 【续 50 安全止损】旧 /webdav 裸奔 DAV 端点已删除(无鉴权可 PUT/DELETE 整个 /mnt/user,
    # 前端零引用)。文件写入统一走下方 /dav/(带 auth_basic)。

    # DAV 统一入口 - /dav/*(续 50 H8/H9 起 alias 到 /mnt/user/ shfs 视图)
    # 历史:曾 alias 到 /mnt/cache/(D4,认为 cache 池是物理位置最可靠)——但只对 cache 池
    # 共享有效;阵列盘共享(如 photos 在 /mnt/disk4)读 404、写会写成 cache 孤儿文件。
    # 【续 50 H8/H9 实测(2026-07-19)】经 shfs 写两种共享全部正确:
    #   阵列盘共享 PUT → 落到 /mnt/disk4;cache 共享 PUT → /mnt/user 与 /mnt/cache 均可见;
    #   MKCOL(带尾斜杠)201;DELETE 204。故 /dav 统一改指 /mnt/user,前端零改动。
    #
    # 【D4 2026-06-14 王洪涛拍板 - 路径 3】nginx basic auth
    # 公网 anyone 原来能直接 DELETE 删 unraid 文件，危险
    # 改：加 auth_basic，密码文件 /etc/nginx/.davpasswd（bcrypt 加密）
    # 用户首次访问需输密码，后续浏览器带 Authorization header
    location ^~ /dav/ {
        alias /mnt/user/;
        dav_methods PUT DELETE MKCOL COPY MOVE;
        dav_access user:rw group:rw all:r;
        create_full_put_path on;
        client_max_body_size 0;

        # D4 鉴权(OPTIONS 由下方 if 在 rewrite 阶段先于 auth 返回;
        # 【续 50.2】401 不带 WWW-Authenticate,防浏览器原生弹窗,见 server 级 error_page)
        auth_basic "unRAID Mobile File Access";
        auth_basic_user_file /etc/nginx/.davpasswd;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, POST, PUT, DELETE, MKCOL, COPY, MOVE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Depth, Destination, Overwrite' always;
        add_header 'Access-Control-Expose-Headers' 'DAV, Content-Length, Last-Modified' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 日志静态服务（autoindex）—— Logs 页用
    # 宿主 /var/log 通过 docker-compose 挂载到容器 /mnt/hostlog:ro
    # URL 路径 /var/log/ 跳到实际 /mnt/hostlog/
    # 必须用 ^~ 严格前缀，避免其他 regex location 抢走
    #
    # 【阶段 5.1.b 2026-06-14】nginx basic auth
    # syslog 可能含 sshd 失败日志、docker token 等敏感信息，公网 anyone 能看太危险
    # 改：加 auth_basic，密码文件 /etc/nginx/.logpasswd（bcrypt 加密）
    # 用户首次访问需输密码，后续浏览器带 Authorization header
    location ^~ /var/log/ {
        alias /mnt/hostlog/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        # 5.1.b 鉴权(OPTIONS 由下方 if 在 rewrite 阶段先于 auth 返回;
        # 【续 50.2】401 不带 WWW-Authenticate,防浏览器原生弹窗,见 server 级 error_page)
        auth_basic "unRAID System Logs";
        auth_basic_user_file /etc/nginx/.logpasswd;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # index.html 不缓存
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 静态资源 1 年缓存 (文件名带 hash, 可以永久缓存)
    # 二次访问几乎秒开 (走浏览器 disk cache, 不发请求)
    # index.html 不缓存 (必须每次拉, 才能拿到新 hash 的 bundle)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # GraphQL API 代理
    # 【续 50 D5】上游经 ${UNRAID_UPSTREAM} 环境变量参数化(nginx:alpine envsubst 模板机制):
    # 镜像内 default.conf 放 /etc/nginx/templates/,容器启动时替换为该变量的值。
    # 公开镜像用户必须 -e UNRAID_UPSTREAM=http://<自己unRAID-IP>:8001,默认见 Dockerfile。
    location /graphql {
        proxy_pass ${UNRAID_UPSTREAM}/graphql;
        proxy_http_version 1.1;

        # 【续 46.4】WebSocket 升级(容器 stats 订阅);普通 POST 时 $connection_upgrade=close 无影响
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, x-api-key, Authorization' always;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 持久化配置读取
    location /config/ {
        alias /usr/share/nginx/html/config/;
        default_type application/json;
        # 允许 GET 读取配置，支持 PUT 写回实现跨设备共享
        dav_methods PUT;
        dav_access user:rw group:rw all:r;
        create_full_put_path on;
        # 【续 50 安全止损】PUT 需鉴权(防冷启动预填投毒:任何人可覆写 settings.json 指到钓鱼服务器)。
        # GET 保持开放(只含 serverUrl,非敏感;新设备冷启动预填不依赖 DAV 密码)。
        # auth_basic 在 limit_except 内合法;OPTIONS 由下方 if return 204 在 rewrite 阶段先于 auth 返回。
        limit_except GET {
            auth_basic "unRAID Mobile Config";
            auth_basic_user_file /etc/nginx/.davpasswd;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Max-Age' 1728000;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 【续 47 2026-07-19】Compose API — 经宿主 php-fpm 执行 compose-api/api.php
    # 通道: 本容器 fastcgi → 宿主 /var/run/php-fpm.sock(compose 挂载到 /hostrun/)
    # api.php 在宿主以 root 身份执行 docker compose;webGui 的会话认证在 8001 nginx 层,
    # fastcgi 直连 php-fpm 不经过它。鉴权由 api.php 自校验 X-Api-Key(续 49 起比对宿主
    # key 文件 /boot/config/plugins/unraid-mobile/,不再读 settings.json)。
    # 注意: socket 属 root:root 660,故 nginx.conf(main) worker 加 root 组(user nginx root;)
    # fastcgi 默认不透传自定义 header,X-Api-Key 必须显式 fastcgi_param
    #
    # 【部署排障 2026-07-19】两个坑,勿改回:
    # 1. 宿主 php.ini 设了 doc_root=/usr/local/emhttp — php-fpm 按 SCRIPT_NAME 相对
    #    doc_root 解析脚本,SCRIPT_NAME 不匹配时无视 SCRIPT_FILENAME 直接 ENOENT
    #    ("No input file specified")。故 api.php 必须放 doc_root 内(插件目录,
    #    tmpfs,由 /boot/config/go 钩子从 appdata 正本恢复),且 SCRIPT_NAME 必须是
    #    doc_root 相对路径,与 SCRIPT_FILENAME 配套。
    # 2. 【续 50 起】default.conf 走 envsubst 模板(/etc/nginx/templates/):改完模板后
    #    docker restart 即重新生成 conf.d/default.conf,不再有 inode 绑定问题。
    location ^~ /compose-api/ {
        fastcgi_pass unix:/hostrun/php-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /usr/local/emhttp/plugins/compose.manager/api.php;
        fastcgi_param SCRIPT_NAME /plugins/compose.manager/api.php;
        fastcgi_param HTTP_X_API_KEY $http_x_api_key;
        fastcgi_connect_timeout 5s;
        fastcgi_read_timeout 300s;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
